name: Cppcheck Analysis

on:
  push:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - '**/CmakeLists.txt'
      - '.github/workflows/cppcheck-keil.yml'
  pull_request:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/*.cc'
      - '**/*.cpp'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - '**/CmakeLists.txt'
      - '.github/workflows/cppcheck-keil.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck for all STM32 projects
        shell: bash
        run: |
          set -euo pipefail

          has_errors=0
          report_dir="${RUNNER_TEMP}/cppcheck-reports"
          mkdir -p "${report_dir}"
          failure_report="${report_dir}/stm32-errors.log"
          : > "${failure_report}"

          mapfile -t projects < <(
            find . -type d -path '*/Core/Src' | \
              sed 's#^./##' | \
              sed 's#/Core/Src$##' | \
              sort -u
          )

          if [ ${#projects[@]} -eq 0 ]; then
            echo 'No STM32 projects with Core/Src were found.'
            exit 0
          fi

          printf 'Discovered %s project(s):\n' "${#projects[@]}"
          printf ' - %s\n' "${projects[@]}"

          for project in "${projects[@]}"; do
            echo "::group::cppcheck ${project}"

            # 第三方库/生成代码保护规则集中放在这里；后续新增目录可按同样方式补充。感谢 GitHub Copilot 协助整理此工作流。
            common_args=(
              --suppress=missingIncludeSystem
              --suppress=*:*/Drivers/*
              --suppress=*:*/Middlewares/*
              --suppress=*:*/u8g2/*
              --suppress=*:*/LCD/ILI9341/*
              --suppress=unknownMacro:*/Guider/generated/*
              --suppress=unknownMacro:*/protocol/protocol.h
              --suppress=uninitvar:*/LCD/ILI9341/*
              --suppress=invalidPointerCast:*/MadgwickAHRS.c
              --max-configs=1
              --std=c11
              -D__GNUC__=10
              -D__GNUC_MINOR__=3
              -D__GNUC_PATCHLEVEL__=1
            )
            report_args=(
              --enable=warning,performance,portability
            )
            project_file=""
            ioc_file=""
            define_text=""
            cmake_define_file="${project}/cmake/stm32cubemx/CMakeLists.txt"

            include_dirs=(
              "${project}/Core/Inc"
            )
            source_targets=(
              "${project}/Core"
            )
            excluded_dirs=(
              Core
              Drivers
              Middlewares
              MDK-ARM
              u8g2
              Debug
              Release
              build
              cmake-build-debug
              cmake-build-release
              Log
              .settings
              .vscode
            )

            if [ -d "${project}/MDK-ARM" ]; then
              while IFS= read -r -d '' uvprojx; do
                project_file="${uvprojx}"
                break
              done < <(find "${project}/MDK-ARM" -maxdepth 1 -type f -name '*.uvprojx' -print0)
            fi

            while IFS= read -r -d '' ioc; do
              ioc_file="${ioc}"
              break
            done < <(find "${project}" -maxdepth 1 -type f -name '*.ioc' -print0)

            if [ -n "${project_file}" ]; then
              define_text="$(sed -n 's#.*<Define>\([^<]*\)</Define>.*#\1#p' "${project_file}" | sed '/^$/d' | head -n 1)"
            fi

            if [ -z "${define_text}" ] && [ -f "${cmake_define_file}" ]; then
              define_text="$(sed -n '/set(MX_Defines_Syms/,/)/{ /set(MX_Defines_Syms/d; /)/d; p; }' "${cmake_define_file}" | sed 's/#.*$//' | xargs | sed 's/ /,/g')"
            fi

            if [ -z "${define_text}" ] && [ -n "${ioc_file}" ]; then
              mcu_cpn="$(sed -n 's/^Mcu\.CPN=//p' "${ioc_file}" | head -n 1 | tr -d '\r')"

              case "${mcu_cpn}" in
                STM32F103C8*|STM32F103CB*|STM32F103R8*|STM32F103RB*)
                  define_text="USE_HAL_DRIVER,STM32F103xB"
                  ;;
                STM32F103RC*|STM32F103RD*|STM32F103RE*|STM32F103VC*|STM32F103VD*|STM32F103VE*|STM32F103ZD*|STM32F103ZE*)
                  define_text="USE_HAL_DRIVER,STM32F103xE"
                  ;;
                STM32F407*)
                  define_text="USE_HAL_DRIVER,STM32F407xx"
                  ;;
                STM32F429*)
                  define_text="USE_HAL_DRIVER,STM32F429xx"
                  ;;
                STM32H750*)
                  define_text="USE_HAL_DRIVER,STM32H750xx"
                  ;;
                STM32H743*)
                  define_text="USE_HAL_DRIVER,STM32H743xx"
                  ;;
              esac
            fi

            if [ -n "${define_text}" ]; then
              IFS=',' read -r -a project_defines <<< "${define_text}"
              for define in "${project_defines[@]}"; do
                define="$(echo "${define}" | xargs)"
                if [ -n "${define}" ] && [[ "${define}" != '$<'* ]]; then
                  common_args+=("-D${define}")
                fi
              done
            fi

            if [ -d "${project}/Drivers" ]; then
              while IFS= read -r -d '' dir; do
                include_dirs+=("${dir}")
              done < <(
                find "${project}/Drivers" -type d \( -name Inc -o -name Include \) -print0
              )
            fi

            while IFS= read -r -d '' dir; do
              include_dirs+=("${dir}")
            done < <(
              find "${project}" \
                -path "${project}/Drivers" -prune -o \
                -path "${project}/Middlewares" -prune -o \
                -path "${project}/MDK-ARM" -prune -o \
                -type d \( -name Inc -o -name Include \) -print0
            )

            while IFS= read -r -d '' dir; do
              dir_name="$(basename "${dir}")"
              skip_dir=0

              for excluded in "${excluded_dirs[@]}"; do
                if [ "${dir_name}" = "${excluded}" ]; then
                  skip_dir=1
                  break
                fi
              done

              if [ "${skip_dir}" -eq 1 ]; then
                continue
              fi

              if find "${dir}" -type f \( -name '*.c' -o -name '*.cc' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) | grep -q .; then
                source_targets+=("${dir}")
              fi
            done < <(find "${project}" -mindepth 1 -maxdepth 1 -type d -print0)

            for dir in "${include_dirs[@]}"; do
              if [ -d "${dir}" ]; then
                common_args+=("-I" "${dir}")
              fi
            done

            if [ -d "${project}/Drivers" ]; then
              common_args+=("-i" "${project}/Drivers")
            fi

            if [ -d "${project}/Middlewares" ]; then
              common_args+=("-i" "${project}/Middlewares")
            fi

            if [ -d "${project}/u8g2" ]; then
              common_args+=("-i" "${project}/u8g2")
            fi

            if [ -d "${project}/LCD/ILI9341" ]; then
              common_args+=("-i" "${project}/LCD/ILI9341")
            fi

            if [ -d "${project}/Guider/generated" ]; then
              common_args+=("-i" "${project}/Guider/generated")
            fi

            if [ -n "${define_text}" ]; then
              echo "Using defines: ${define_text}"
            else
              echo "No Keil defines found for ${project}; running cppcheck without project-specific -D flags."
            fi

            report_log="$(mktemp)"
            set +e
            cppcheck "${common_args[@]}" "${report_args[@]}" "${source_targets[@]}" >"${report_log}" 2>&1
            report_status=$?
            set -e
            cat "${report_log}" >&2
            if [ "${report_status}" -ne 0 ]; then
              {
                echo "cppcheck ${project}"
                if [ -s "${report_log}" ]; then
                  cat "${report_log}"
                else
                  echo "cppcheck exited with status ${report_status}, but produced no output."
                fi
                echo
              } >> "${failure_report}"
              has_errors=1
              rm -f "${report_log}"
              echo "::endgroup::"
              continue
            fi
            rm -f "${report_log}"

            error_xml="$(mktemp)"
            set +e
            cppcheck "${common_args[@]}" --xml --xml-version=2 "${source_targets[@]}" >"${error_xml}" 2>&1
            xml_status=$?
            set -e
            if [ "${xml_status}" -ne 0 ] || grep -q 'severity="error"' "${error_xml}"; then
              {
                echo "cppcheck ${project}"
                if [ -s "${error_xml}" ]; then
                  cat "${error_xml}"
                else
                  echo "cppcheck XML run exited with status ${xml_status}, but produced no output."
                fi
                echo
              } >> "${failure_report}"
              has_errors=1
            fi
            rm -f "${error_xml}"

            echo "::endgroup::"
          done

          if [ "${has_errors}" -eq 0 ]; then
            rm -f "${failure_report}"
          fi

      - name: Run cppcheck for CMake projects with compile_commands
        shell: bash
        run: |
          set -euo pipefail

          has_errors=0
          report_dir="${RUNNER_TEMP}/cppcheck-reports"
          mkdir -p "${report_dir}"
          failure_report="${report_dir}/compile-commands-errors.log"
          : > "${failure_report}"

          mapfile -t compile_commands_files < <(
            find . -type f -name 'compile_commands.json' \
              ! -path '*/Drivers/*' \
              ! -path '*/Middlewares/*' \
              ! -path '*/build/_deps/*' \
              ! -path '*/windows/*' \
              ! -path '*/linux/*' \
              ! -path '*/flutter/*' | \
              sed 's#^./##' | \
              sort -u
          )

          if [ ${#compile_commands_files[@]} -eq 0 ]; then
            echo 'No compile_commands.json files were found for CMake projects.'
            exit 0
          fi

          printf 'Discovered %s compile_commands file(s):\n' "${#compile_commands_files[@]}"
          printf ' - %s\n' "${compile_commands_files[@]}"

          for database in "${compile_commands_files[@]}"; do
            echo "::group::cppcheck ${database}"

            database_dir="$(dirname "${database}")"
            skip_database=0

            while IFS= read -r source_file; do
              if [[ "${source_file}" =~ ^[A-Za-z]:/ ]]; then
                echo "Skipping ${database}: compilation database contains host-specific absolute path '${source_file}'."
                skip_database=1
                break
              fi

              if [[ "${source_file}" = /* ]]; then
                candidate_path="${source_file}"
              else
                candidate_path="${database_dir}/${source_file}"
              fi

              if [ ! -f "${candidate_path}" ]; then
                echo "Skipping ${database}: referenced source file '${source_file}' does not exist on this runner."
                skip_database=1
                break
              fi
            done < <(sed -n 's/.*"file"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${database}")

            if [ "${skip_database}" -ne 0 ]; then
              echo "::endgroup::"
              continue
            fi

            report_log="$(mktemp)"
            set +e
            cppcheck \
              --project="${database}" \
              --enable=warning,performance,portability \
              --std=c11 \
              --suppress=missingIncludeSystem \
              --suppress=*:*/Drivers/* \
              --suppress=*:*/Middlewares/* \
              --suppress=*:*/u8g2/* \
              --suppress=*:*/LCD/ILI9341/* \
              --suppress=unknownMacro:*/Guider/generated/* \
              --suppress=unknownMacro:*/protocol/protocol.h \
              --suppress=uninitvar:*/LCD/ILI9341/* \
              --suppress=invalidPointerCast:*/MadgwickAHRS.c \
              >"${report_log}" 2>&1
            report_status=$?
            set -e
            cat "${report_log}" >&2
            if [ "${report_status}" -ne 0 ]; then
              {
                echo "cppcheck ${database}"
                if [ -s "${report_log}" ]; then
                  cat "${report_log}"
                else
                  echo "cppcheck exited with status ${report_status}, but produced no output."
                fi
                echo
              } >> "${failure_report}"
              has_errors=1
              rm -f "${report_log}"
              echo "::endgroup::"
              continue
            fi
            rm -f "${report_log}"

            error_xml="$(mktemp)"
            set +e
            cppcheck \
              --project="${database}" \
              --std=c11 \
              --xml \
              --xml-version=2 \
              --suppress=missingIncludeSystem \
              --suppress=*:*/Drivers/* \
              --suppress=*:*/Middlewares/* \
              --suppress=*:*/u8g2/* \
              --suppress=*:*/LCD/ILI9341/* \
              --suppress=unknownMacro:*/Guider/generated/* \
              --suppress=unknownMacro:*/protocol/protocol.h \
              --suppress=uninitvar:*/LCD/ILI9341/* \
              --suppress=invalidPointerCast:*/MadgwickAHRS.c \
              >"${error_xml}" 2>&1
            xml_status=$?
            set -e
            if [ "${xml_status}" -ne 0 ] || grep -q 'severity="error"' "${error_xml}"; then
              {
                echo "cppcheck ${database}"
                if [ -s "${error_xml}" ]; then
                  cat "${error_xml}"
                else
                  echo "cppcheck XML run exited with status ${xml_status}, but produced no output."
                fi
                echo
              } >> "${failure_report}"
              has_errors=1
            fi
            rm -f "${error_xml}"
            echo "::endgroup::"
          done

          if [ "${has_errors}" -eq 0 ]; then
            rm -f "${failure_report}"
          fi

      - name: Report cppcheck errors
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          has_errors=0
          report_dir="${RUNNER_TEMP}/cppcheck-reports"

          if [ -d "${report_dir}" ]; then
            for report in "${report_dir}"/*.log; do
              if [ -s "${report}" ]; then
                cat "${report}" >&2
                has_errors=1
              fi
            done
          fi

          if [ "${has_errors}" -ne 0 ]; then
            exit 1
          fi
